
<style>
  .quiz-wrap { padding: 1.5rem 0; font-family: var(--font-sans); }
  .progress-bar-bg { height: 6px; background: var(--color-background-secondary); border-radius: 99px; margin-bottom: 1.5rem; }
  .progress-bar-fill { height: 6px; background: #1D9E75; border-radius: 99px; transition: width 0.4s ease; }
  .q-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
  .q-label { font-size: 13px; color: var(--color-text-secondary); }
  .q-text { font-size: 17px; font-weight: 500; color: var(--color-text-primary); line-height: 1.5; margin-bottom: 1.25rem; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt-btn { text-align: left; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-lg); padding: 12px 16px; font-size: 15px; color: var(--color-text-primary); cursor: pointer; transition: background 0.15s, border-color 0.15s; display: flex; align-items: center; gap: 10px; }
  .opt-btn:hover:not(:disabled) { background: var(--color-background-secondary); border-color: var(--color-border-primary); }
  .opt-btn.correct { background: #E1F5EE; border-color: #1D9E75; color: #0F6E56; }
  .opt-btn.wrong { background: #FCEBEB; border-color: #E24B4A; color: #A32D2D; }
  .opt-btn.reveal { background: #E1F5EE; border-color: #1D9E75; color: #0F6E56; opacity: 0.7; }
  .opt-btn:disabled { cursor: default; }
  .opt-letter { font-size: 12px; font-weight: 500; width: 22px; height: 22px; border-radius: 50%; background: var(--color-background-secondary); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .correct .opt-letter { background: #9FE1CB; color: #085041; }
  .wrong .opt-letter { background: #F7C1C1; color: #791F1F; }
  .reveal .opt-letter { background: #9FE1CB; color: #085041; }
  .feedback { margin-top: 1rem; font-size: 14px; padding: 10px 14px; border-radius: var(--border-radius-md); }
  .feedback.ok { background: #E1F5EE; color: #0F6E56; border-left: 3px solid #1D9E75; }
  .feedback.no { background: #FCEBEB; color: #A32D2D; border-left: 3px solid #E24B4A; }
  .nav-row { display: flex; justify-content: flex-end; margin-top: 1.25rem; }
  .next-btn { background: #1D9E75; color: #fff; border: none; border-radius: var(--border-radius-md); padding: 10px 24px; font-size: 15px; font-weight: 500; cursor: pointer; }
  .next-btn:hover { background: #0F6E56; }
  .result-box { text-align: center; padding: 2rem 1rem; }
  .score-circle { width: 110px; height: 110px; border-radius: 50%; background: #E1F5EE; border: 3px solid #1D9E75; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 1.25rem; }
  .score-num { font-size: 30px; font-weight: 500; color: #0F6E56; }
  .score-den { font-size: 13px; color: #1D9E75; }
  .result-title { font-size: 20px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 0.5rem; }
  .result-sub { font-size: 15px; color: var(--color-text-secondary); margin-bottom: 1.5rem; }
  .stat-row { display: flex; justify-content: center; gap: 16px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .stat-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 20px; min-width: 90px; }
  .stat-val { font-size: 22px; font-weight: 500; }
  .stat-lbl { font-size: 12px; color: var(--color-text-secondary); }
  .retry-btn { background: #1D9E75; color: #fff; border: none; border-radius: var(--border-radius-md); padding: 11px 28px; font-size: 15px; font-weight: 500; cursor: pointer; }
  .retry-btn:hover { background: #0F6E56; }
  .q-dots { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 1.25rem; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); }
  .dot.done-ok { background: #1D9E75; border-color: #1D9E75; }
  .dot.done-no { background: #E24B4A; border-color: #E24B4A; }
  .dot.active { background: var(--color-background-secondary); border: 2px solid #1D9E75; }
</style>

<div class="quiz-wrap" role="main">
  <h2 class="sr-only">Programming Foundations for STEM — 20-question multiple choice quiz</h2>
  <div id="quiz-body"></div>
</div>

<script>
const questions = [
  {
    q: "What is an algorithm?",
    opts: ["A type of computer hardware", "A step-by-step set of instructions to solve a problem", "A programming language syntax rule", "A graphical user interface component"],
    ans: 1,
    exp: "An algorithm is a finite, ordered set of instructions designed to solve a specific problem or perform a task."
  },
  {
    q: "Which of the following best describes a variable in programming?",
    opts: ["A fixed value that never changes", "A storage location with a name that holds data", "A function that returns a result", "A type of loop structure"],
    ans: 1,
    exp: "A variable is a named storage location in memory that holds a value, which can change during program execution."
  },
  {
    q: "What does a conditional statement (if/else) allow a program to do?",
    opts: ["Repeat a block of code multiple times", "Make decisions based on a condition", "Define a reusable block of code", "Store multiple values in sequence"],
    ans: 1,
    exp: "Conditional statements let a program execute different code paths depending on whether a condition evaluates to true or false."
  },
  {
    q: "In programming, what is a loop used for?",
    opts: ["To store data permanently", "To connect to the internet", "To execute a block of code repeatedly", "To define new data types"],
    ans: 2,
    exp: "Loops (for, while, do-while) allow a block of code to execute repeatedly — either a fixed number of times or while a condition holds."
  },
  {
    q: "What is the output of: 7 % 3 (where % is the modulo operator)?",
    opts: ["2", "1", "3", "0"],
    ans: 1,
    exp: "7 divided by 3 gives quotient 2 with remainder 1. The modulo operator returns the remainder, so 7 % 3 = 1."
  },
  {
    q: "Which data type would best store a person's age?",
    opts: ["String", "Boolean", "Integer", "Float"],
    ans: 2,
    exp: "Age is a whole number, making an integer (int) the most appropriate data type. A float would work but adds unnecessary decimal precision."
  },
  {
    q: "What is a function (or procedure) in programming?",
    opts: ["A named, reusable block of code that performs a specific task", "A condition that evaluates to true or false", "A variable that stores multiple values", "A type of data structure"],
    ans: 0,
    exp: "Functions encapsulate a reusable block of code under a name. They promote code reuse, readability, and modularity."
  },
  {
    q: "What is pseudocode?",
    opts: ["Code written in Python", "A visual flowchart diagram", "An informal, plain-language description of an algorithm", "A compiled program language"],
    ans: 2,
    exp: "Pseudocode is a high-level description of an algorithm using plain language and basic logic constructs — it's not meant to be executed but helps plan code."
  },
  {
    q: "In Boolean logic, what does the AND operator return?",
    opts: ["True if at least one operand is true", "True only if both operands are true", "True only if both operands are false", "Always returns true"],
    ans: 1,
    exp: "AND is true only when all operands are true. If any operand is false, the entire AND expression evaluates to false."
  },
  {
    q: "What is debugging?",
    opts: ["Writing comments in code", "The process of finding and fixing errors in a program", "Compiling source code into machine code", "Designing the user interface"],
    ans: 1,
    exp: "Debugging is the systematic process of identifying, isolating, and correcting errors (bugs) in a program."
  },
  {
    q: "Which of the following is an example of a syntax error?",
    opts: ["A loop that runs forever", "Dividing a number by zero at runtime", "A missing closing parenthesis in code", "Getting the wrong answer from a calculation"],
    ans: 2,
    exp: "Syntax errors occur when code violates the grammar rules of the language — like a missing bracket. They are caught by the compiler/interpreter before execution."
  },
  {
    q: "What does 'data type' refer to in programming?",
    opts: ["The speed at which data is processed", "The classification of data that tells the compiler how to interpret it", "The physical storage location in RAM", "The name assigned to a variable"],
    ans: 1,
    exp: "A data type classifies what kind of value a variable can hold (integer, string, boolean, float) and determines what operations can be performed on it."
  },
  {
    q: "What is the purpose of a flowchart in problem-solving?",
    opts: ["To write executable code", "To visually represent the steps and logic of a process or algorithm", "To measure algorithm performance", "To manage version control"],
    ans: 1,
    exp: "Flowcharts use standard symbols (ovals, rectangles, diamonds) to map out the flow of logic visually before or alongside coding."
  },
  {
    q: "Which of the following correctly describes an array?",
    opts: ["A single variable that stores one value", "An ordered collection of elements of the same type", "A function that sorts data", "A conditional expression"],
    ans: 1,
    exp: "An array stores multiple values in a single, indexed structure. Elements are accessed by their position (index), usually starting at 0."
  },
  {
    q: "What is the difference between a compiler and an interpreter?",
    opts: ["A compiler runs code line by line; an interpreter translates all at once", "A compiler translates the entire program before execution; an interpreter translates line by line", "They are identical tools", "A compiler is only used for web development"],
    ans: 1,
    exp: "A compiler translates the full source code into machine code before running. An interpreter reads and executes the source code line by line at runtime."
  },
  {
    q: "In computational thinking, what does 'decomposition' mean?",
    opts: ["Compressing data to save memory", "Breaking a complex problem into smaller, manageable parts", "Sorting a list from largest to smallest", "Removing unused variables from code"],
    ans: 1,
    exp: "Decomposition is one of the four pillars of computational thinking — it means dividing a complex problem into sub-problems that are easier to solve individually."
  },
  {
    q: "What is the value of x after: x = 5; x = x + 3?",
    opts: ["5", "3", "8", "15"],
    ans: 2,
    exp: "x starts at 5. The second statement adds 3 to the current value of x (5 + 3 = 8) and assigns the result back to x."
  },
  {
    q: "Which type of loop is best when you know exactly how many times to repeat?",
    opts: ["while loop", "do-while loop", "for loop", "recursive loop"],
    ans: 2,
    exp: "A for loop is ideal when the number of iterations is known in advance. It combines initialization, condition check, and increment in one statement."
  },
  {
    q: "What does 'abstraction' mean in the context of programming?",
    opts: ["Writing code without any comments", "Hiding complex implementation details and showing only essential features", "Converting numbers from decimal to binary", "Connecting multiple programs together"],
    ans: 1,
    exp: "Abstraction means simplifying complex systems by exposing only necessary details — like calling a function without needing to know how it works internally."
  },
  {
    q: "Which of the following is a logic (runtime) error?",
    opts: ["Forgetting a semicolon at the end of a statement", "Using an undefined variable name", "A program that runs but produces incorrect results", "A missing import statement"],
    ans: 2,
    exp: "Logic errors don't crash the program but produce wrong results because the algorithm or logic is flawed. They are often the hardest bugs to detect."
  }
];

let current = 0;
let score = 0;
let answered = [];
let selected = null;

function render() {
  const body = document.getElementById('quiz-body');
  if (current >= questions.length) {
    renderResult(body); return;
  }
  const q = questions[current];
  const pct = (current / questions.length) * 100;
  const letters = ['A','B','C','D'];
  const isAnswered = answered[current] !== undefined;

  body.innerHTML = `
    <div class="q-dots" aria-hidden="true">
      ${questions.map((_,i) => {
        let cls = 'dot';
        if (i === current) cls += ' active';
        else if (answered[i] !== undefined) cls += answered[i] ? ' done-ok' : ' done-no';
        return `<div class="${cls}"></div>`;
      }).join('')}
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    <div class="q-header">
      <span class="q-label">Question ${current + 1} of ${questions.length}</span>
      <span class="q-label">Score: ${score}</span>
    </div>
    <p class="q-text">${q.q}</p>
    <div class="options">
      ${q.opts.map((opt, i) => {
        let cls = 'opt-btn';
        if (isAnswered) {
          if (i === q.ans) cls += ' correct';
          else if (i === selected && i !== q.ans) cls += ' wrong';
        }
        return `<button class="${cls}" ${isAnswered ? 'disabled' : ''} onclick="choose(${i})">
          <span class="opt-letter">${letters[i]}</span>
          <span>${opt}</span>
        </button>`;
      }).join('')}
    </div>
    ${isAnswered ? `
      <div class="feedback ${answered[current] ? 'ok' : 'no'}">
        ${answered[current] ? '<strong>Correct!</strong>' : '<strong>Incorrect.</strong>'} ${q.exp}
      </div>
      <div class="nav-row">
        <button class="next-btn" onclick="next()">${current + 1 < questions.length ? 'Next question →' : 'See results →'}</button>
      </div>` : ''}
  `;
}

function choose(i) {
  if (answered[current] !== undefined) return;
  selected = i;
  const correct = i === questions[current].ans;
  answered[current] = correct;
  if (correct) score++;
  render();
}

function next() {
  current++;
  selected = null;
  render();
}

function renderResult(body) {
  const pct = Math.round((score / questions.length) * 100);
  let msg, grade;
  if (pct >= 90) { msg = "Outstanding! You have a strong grasp of programming fundamentals."; grade = "A"; }
  else if (pct >= 80) { msg = "Great work! You know your STEM programming foundations well."; grade = "B"; }
  else if (pct >= 70) { msg = "Good effort! Review a few concepts and you'll ace it next time."; grade = "C"; }
  else if (pct >= 60) { msg = "Keep going — revisit the core concepts and try again."; grade = "D"; }
  else { msg = "Don't give up! Study the fundamentals and give it another go."; grade = "F"; }

  const wrong = questions.length - score;
  body.innerHTML = `
    <div class="result-box">
      <div class="score-circle">
        <span class="score-num">${score}</span>
        <span class="score-den">out of ${questions.length}</span>
      </div>
      <p class="result-title">Grade: ${grade} &nbsp;·&nbsp; ${pct}%</p>
      <p class="result-sub">${msg}</p>
      <div class="stat-row">
        <div class="stat-card"><div class="stat-val" style="color:#1D9E75">${score}</div><div class="stat-lbl">Correct</div></div>
        <div class="stat-card"><div class="stat-val" style="color:#E24B4A">${wrong}</div><div class="stat-lbl">Incorrect</div></div>
        <div class="stat-card"><div class="stat-val">${pct}%</div><div class="stat-lbl">Score</div></div>
      </div>
      <button class="retry-btn" onclick="restart()">Retry quiz</button>
    </div>
  `;
}

function restart() {
  current = 0; score = 0; answered = []; selected = null;
  render();
}

render();
</script>
